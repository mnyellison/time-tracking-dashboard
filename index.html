<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Time tracking dashboard</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />

    <script src="./js/script.js" defer></script>
  </head>
  <body>
    <main class="dashboard">
      <!-- CARD HEADER -->
      <header class="card card-header">
        <div class="card-profile">
          <img src="./images/image-jeremy.png" alt="Jeremy Robson" />
          <div class="card-texts">
            <span class="card-info">Report for</span>
            <h1>Jeremy Robson</h1>
          </div>
        </div>

        <div class="card-controls">
          <ul>
            <li>
              <button type="button" class="control-btn" data-timeframe="daily">
                Daily
              </button>
            </li>
            <li>
              <button
                type="button"
                class="control-btn active"
                data-timeframe="Weekly"
              >
                Weekly
              </button>
            </li>
            <li>
              <button
                type="button"
                class="control-btn"
                data-timeframe="Monthly"
              >
                Monthly
              </button>
            </li>
          </ul>
        </div>
      </header>

      <!-- CARD WORK -->
      <section class="card-activity card-activity--work">
        <div class="card-activity__bg">
          <img src="./images/icon-work.svg" alt="" aria-hidden="true" />
        </div>

        <div class="card-activity__content">
          <div class="card-activity__header">
            <h2 class="card-activity__title">Work</h2>
            <button
              type="button"
              class="card-activity__options-btn"
              aria-label="More options"
            >
              <img src="./images/icon-ellipsis.svg" alt="" />
            </button>
          </div>

          <div class="card-activity__time-info">
            <p class="card-activity__current-time">32hrs</p>
            <p class="card-activity__previous-time">Previous - 36hrs</p>
          </div>
        </div>
      </section>

      <!-- CARD PLAY -->
      <section class="card-activity card-activity--play">
        <div class="card-activity__bg">
          <img src="./images/icon-play.svg" alt="" aria-hidden="true" />
        </div>

        <div class="card-activity__content">
          <div class="card-activity__header">
            <h2 class="card-activity__title">Play</h2>
            <button
              type="button"
              class="card-activity__options-btn"
              aria-label="More options"
            >
              <img src="./images/icon-ellipsis.svg" alt="" />
            </button>
          </div>

          <div class="card-activity__time-info">
            <p class="card-activity__current-time">10hrs</p>
            <p class="card-activity__previous-time">Previous - 8hrs</p>
          </div>
        </div>
      </section>

      <!-- CARD STUDY -->
      <section class="card-activity card-activity--study">
        <div class="card-activity__bg">
          <img src="./images/icon-study.svg" alt="" aria-hidden="true" />
        </div>

        <div class="card-activity__content">
          <div class="card-activity__header">
            <h2 class="card-activity__title">Study</h2>
            <button
              type="button"
              class="card-activity__options-btn"
              aria-label="More options"
            >
              <img src="./images/icon-ellipsis.svg" alt="" />
            </button>
          </div>

          <div class="card-activity__time-info">
            <p class="card-activity__current-time">4hrs</p>
            <p class="card-activity__previous-time">Previous - 7hrs</p>
          </div>
        </div>
      </section>

      <!-- CARD EXERCISE -->
      <section class="card-activity card-activity--exercise">
        <div class="card-activity__bg">
          <img src="./images/icon-exercise.svg" alt="" aria-hidden="true" />
        </div>

        <div class="card-activity__content">
          <div class="card-activity__header">
            <h2 class="card-activity__title">Exercise</h2>
            <button
              type="button"
              class="card-activity__options-btn"
              aria-label="More options"
            >
              <img src="./images/icon-ellipsis.svg" alt="" />
            </button>
          </div>

          <div class="card-activity__time-info">
            <p class="card-activity__current-time">4hrs</p>
            <p class="card-activity__previous-time">Previous - 5hrs</p>
          </div>
        </div>
      </section>

      <!-- CARD SOCIAL -->
      <section class="card-activity card-activity--social">
        <div class="card-activity__bg">
          <img src="./images/icon-social.svg" alt="" aria-hidden="true" />
        </div>

        <div class="card-activity__content">
          <div class="card-activity__header">
            <h2 class="card-activity__title">Social</h2>
            <button
              type="button"
              class="card-activity__options-btn"
              aria-label="More options"
            >
              <img src="./images/icon-ellipsis.svg" alt="" />
            </button>
          </div>

          <div class="card-activity__time-info">
            <p class="card-activity__current-time">5hrs</p>
            <p class="card-activity__previous-time">Previous - 10hrs</p>
          </div>
        </div>
      </section>

      <!-- CARD SELF CARE -->
      <section class="card-activity card-activity--self-care">
        <div class="card-activity__bg">
          <img src="./images/icon-self-care.svg" alt="" aria-hidden="true" />
        </div>

        <div class="card-activity__content">
          <div class="card-activity__header">
            <h2 class="card-activity__title">Self Care</h2>
            <button
              type="button"
              class="card-activity__options-btn"
              aria-label="More options"
            >
              <img src="./images/icon-ellipsis.svg" alt="" />
            </button>
          </div>

          <div class="card-activity__time-info">
            <p class="card-activity__current-time">2hrs</p>
            <p class="card-activity__previous-time">Previous - 2hrs</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
