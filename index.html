<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Time tracking dashboard</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />

    <script src="./js/script.js" defer></script>
  </head>
  <body>
    <main class="activity-tracker">
      <section class="activity-tracker__menu">
        <div class="activity-tracker__owner">
          <img
            src="./images/image-jeremy.png"
            alt=""
            class="activity-tracker__owner-img"
          />
          <div class="activity-tracker__owner-container">
            <p class="activity-tracker__owner-for">Report for</p>
            <h1 class="activity-tracker__owner-name">Jeremy Robson</h1>
          </div>
        </div>
        <div class="activity-tracker__options">
          <button class="activity-tracker__option" data-option="daily">
            Daily
          </button>
          <button class="activity-tracker__option active" data-option="weekly">
            Weekly
          </button>
          <button class="activity-tracker__option" data-option="monthly">
            Monthly
          </button>
        </div>
      </section>

      <section class="activity-tracker__activity work" data-title="Work">
        <div class="activity__bg">
          <img src="./images/icon-work.svg" alt="" />
        </div>
        <div class="activity__info">
          <header class="activity__header">
            <h2 class="activity__name">Work</h2>
            <div class="activity__options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="activity__timeframes">
            <h3 class="activity__current-timeframe">32hrs</h3>
            <div class="activity__previous-timeframe">
              <p class="time-window">Previous</p>
              <p>-</p>
              <p class="time">36hrs</p>
            </div>
          </div>
        </div>
      </section>

      <section class="activity-tracker__activity play" data-title="Play">
        <div class="activity__bg">
          <img src="./images/icon-play.svg" alt="" />
        </div>
        <div class="activity__info">
          <header class="activity__header">
            <h2 class="activity__name">Play</h2>
            <div class="activity__options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="activity__timeframes">
            <h3 class="activity__current-timeframe">10hrs</h3>
            <div class="activity__previous-timeframe">
              <p class="time-window">Previous</p>
              <p>-</p>
              <p class="time">8hrs</p>
            </div>
          </div>
        </div>
      </section>

      <section class="activity-tracker__activity study" data-title="Study">
        <div class="activity__bg">
          <img src="./images/icon-study.svg" alt="" />
        </div>
        <div class="activity__info">
          <header class="activity__header">
            <h2 class="activity__name">Study</h2>
            <div class="activity__options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="activity__timeframes">
            <h3 class="activity__current-timeframe">4hrs</h3>
            <div class="activity__previous-timeframe">
              <p class="time-window">Previous</p>
              <p>-</p>
              <p class="time">7hrs</p>
            </div>
          </div>
        </div>
      </section>

      <section
        class="activity-tracker__activity exercise"
        data-title="Exercise"
      >
        <div class="activity__bg">
          <img src="./images/icon-exercise.svg" alt="" />
        </div>
        <div class="activity__info">
          <header class="activity__header">
            <h2 class="activity__name">Exercise</h2>
            <div class="activity__options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="activity__timeframes">
            <h3 class="activity__current-timeframe">4hrs</h3>
            <div class="activity__previous-timeframe">
              <p class="time-window">Previous</p>
              <p>-</p>
              <p class="time">5hrs</p>
            </div>
          </div>
        </div>
      </section>

      <section class="activity-tracker__activity social" data-title="Social">
        <div class="activity__bg">
          <img src="./images/icon-social.svg" alt="" />
        </div>
        <div class="activity__info">
          <header class="activity__header">
            <h2 class="activity__name">Social</h2>
            <div class="activity__options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="activity__timeframes">
            <h3 class="activity__current-timeframe">5hrs</h3>
            <div class="activity__previous-timeframe">
              <p class="time-window">Previous</p>
              <p>-</p>
              <p class="time">10hrs</p>
            </div>
          </div>
        </div>
      </section>

      <section
        class="activity-tracker__activity self-care"
        data-title="Self Care"
      >
        <div class="activity__bg">
          <img src="./images/icon-self-care.svg" alt="" />
        </div>
        <div class="activity__info">
          <header class="activity__header">
            <h2 class="activity__name">Self Care</h2>
            <div class="activity__options">
              <img src="./images/icon-ellipsis.svg" alt="" />
            </div>
          </header>
          <div class="activity__timeframes">
            <h3 class="activity__current-timeframe">2hrs</h3>
            <div class="activity__previous-timeframe">
              <p class="time-window">Previous</p>
              <p>-</p>
              <p class="time">2hrs</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
